openapi: 3.0.3
info:
  title: GitHub Repositories
  version: 1.0.0
paths:
  /users/{username}/repos:
    get:
      operationId: listUserRepos
      summary: List repositories for a user
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
            enum: [ all, owner, member ]
            default: owner
        - name: sort
          in: query
          schema:
            type: string
            enum: [ created, updated, pushed, full_name ]
            default: full_name
        - name: direction
          in: query
          schema:
            type: string
            enum: [ asc, desc ]
        - name: per_page
          in: query
          schema:
            type: integer
            default: 30
        - name: page
          in: query
          schema:
            type: integer
            default: 1
      responses:
        '200':
          description: A list of repositories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Repository'
